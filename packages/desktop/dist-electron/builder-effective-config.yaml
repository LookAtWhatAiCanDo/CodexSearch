directories:
  output: dist-electron
  buildResources: assets
appId: com.lookatwhataiCando.codexsearch
productName: CodexSearch
copyright: Copyright © 2025 LookAtWhatAiCanDo
files:
  - filter:
      - dist/**
      - '!dist/**/*.map'
extraResources:
  - from: ../web/dist
    to: web/dist
    filter:
      - '**/*'
extraMetadata:
  main: dist/main.js
nodeGypRebuild: false
npmRebuild: false
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  icon: assets/icon.icns
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: assets/icon.png
  category: Utility
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
publish:
  provider: github
  owner: LookAtWhatAiCanDo
  repo: CodexSearch
  releaseType: release
electronVersion: 33.4.11
