<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: dark rounded square matching app theme -->
  <rect width="1024" height="1024" rx="230" fill="#0d0d0f"/>

  <!-- Subtle inner gradient overlay for depth -->
  <defs>
    <radialGradient id="bg-glow" cx="40%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#1e1e2e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0d0d0f" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="lens-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </radialGradient>
    <clipPath id="lens-clip">
      <!-- Clip the result lines to inside the lens -->
      <circle cx="410" cy="390" r="142"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" rx="230" fill="url(#bg-glow)"/>

  <!-- Magnifying glass handle (drawn first, behind ring) -->
  <line x1="567" y1="547" x2="780" y2="760"
        stroke="#4f46e5" stroke-width="80" stroke-linecap="round"/>

  <!-- Lens ring (indigo gradient) -->
  <circle cx="410" cy="390" r="210"
          fill="none"
          stroke="url(#lens-glow)" stroke-width="70"/>

  <!-- Search result lines inside the lens (clipped to circle) -->
  <g clip-path="url(#lens-clip)">
    <!-- Line 1: full width, bright -->
    <line x1="290" y1="345" x2="530" y2="345"
          stroke="#e4e4e7" stroke-width="44" stroke-linecap="round" opacity="0.90"/>
    <!-- Line 2: slightly shorter, dimmer -->
    <line x1="290" y1="405" x2="500" y2="405"
          stroke="#e4e4e7" stroke-width="44" stroke-linecap="round" opacity="0.55"/>
    <!-- Line 3: shortest, dimmest -->
    <line x1="290" y1="465" x2="460" y2="465"
          stroke="#e4e4e7" stroke-width="44" stroke-linecap="round" opacity="0.28"/>
  </g>

  <!-- Small dot accent on handle end -->
  <circle cx="780" cy="760" r="40" fill="#6366f1" opacity="0.6"/>
</svg>
