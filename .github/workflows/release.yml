name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    permissions:
      contents: write   # required to create GitHub Releases and upload assets
    strategy:
      fail-fast: false   # let all three platforms run to completion independently
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build -w @codex-search/core

      - name: Build server
        run: npm run build -w @codex-search/server

      - name: Build web
        run: npm run build -w @codex-search/web

      - name: Build desktop
        run: npm run build -w @codex-search/desktop

      - name: Package (Mac)
        if: matrix.platform == 'mac'
        # Unset CSC_LINK at shell level if empty — electron-builder resolves ""
        # to the CWD (packages/desktop) and errors "not a file" when no cert is set.
        run: |
          [ -z "$CSC_LINK" ] && unset CSC_LINK || true
          npm run dist:mac -w @codex-search/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Package (Windows)
        if: matrix.platform == 'win'
        # Same empty-string issue as Mac — unset CSC_LINK in PowerShell if empty.
        shell: pwsh
        run: |
          if ([string]::IsNullOrEmpty($env:CSC_LINK)) { Remove-Item Env:CSC_LINK -ErrorAction SilentlyContinue }
          npm run dist:win -w @codex-search/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WIN_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: npm run dist:linux -w @codex-search/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
